<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bean Sprout Realty — Admin · Client Files</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ash:        #F4F4F2;
    --ash-mid:    #E8E8E4;
    --ash-dark:   #D4D4CE;
    --navy:       #1B2C3A;
    --navy-deep:  #0F1C27;
    --steel:      #4A7FA5;
    --steel-faint:#C8D8E4;
    --white:      #FFFFFF;
    --text:       #2A2A28;
    --text-mid:   #5A5A56;
    --text-light: #8A8A84;
    --danger:     #A5544A;
    --font-display: 'Cormorant Garamond', serif;
    --font-body:    'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--ash);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 56px 6% 80px; }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    flex-wrap: wrap; gap: 20px; margin-bottom: 8px; padding-bottom: 28px;
    border-bottom: 1px solid var(--ash-dark);
  }
  .brand-label {
    font-size: 0.68rem; font-weight: 500; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--steel); margin-bottom: 10px; display: block;
  }
  .brand-title {
    font-family: var(--font-display); font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    font-weight: 400; color: var(--navy); line-height: 1.1;
  }
  .pill {
    font-size: 0.66rem; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 500;
    color: var(--steel); background: var(--steel-faint); padding: 6px 14px;
    border-radius: 20px; flex-shrink: 0;
  }
  .meta-bar { margin: 28px 0 32px; }
  .meta-text { font-size: 0.86rem; color: var(--text-light); font-weight: 300; }
  .drop-zone {
    border: 1.5px dashed var(--ash-dark); border-radius: 4px; background: var(--white);
    padding: 40px 28px; text-align: center; margin-bottom: 36px;
    transition: border-color .2s, background .2s; cursor: pointer;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--steel); background: var(--steel-faint); }
  .drop-icon {
    width: 42px; height: 42px; margin: 0 auto 16px; border: 1.5px solid var(--steel);
    border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--steel);
  }
  .drop-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 400; color: var(--navy); margin-bottom: 6px; }
  .drop-sub { font-size: 0.82rem; color: var(--text-light); font-weight: 300; }
  .file-list { display: flex; flex-direction: column; gap: 2px; background: var(--ash-mid); border: 1px solid var(--ash-mid); border-radius: 2px; }
  .file-row { display: flex; align-items: center; gap: 18px; padding: 18px 22px; background: var(--white); transition: background .2s; }
  .file-row:hover { background: var(--ash); }
  .file-icon {
    width: 38px; height: 38px; flex-shrink: 0; border-radius: 3px; background: var(--ash);
    display: flex; align-items: center; justify-content: center; color: var(--steel);
    font-family: var(--font-display); font-size: 0.68rem; font-weight: 600;
    letter-spacing: 0.02em; text-transform: uppercase; border: 1px solid var(--ash-dark);
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 0.92rem; font-weight: 500; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-sub { font-size: 0.74rem; color: var(--text-light); font-weight: 300; margin-top: 3px; }
  .file-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-icon {
    font-family: var(--font-body); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 9px 16px; border-radius: 2px; border: 1px solid var(--navy);
    color: var(--navy); background: transparent; cursor: pointer; text-decoration: none;
    transition: background .2s, color .2s; display: inline-block;
  }
  .btn-icon:hover { background: var(--navy); color: var(--white); }
  .btn-icon.danger { border-color: var(--danger); color: var(--danger); }
  .btn-icon.danger:hover { background: var(--danger); color: var(--white); }
  .btn-icon:disabled { opacity: 0.5; cursor: not-allowed; }
  .empty-state { text-align: center; padding: 70px 20px; background: var(--white); border: 1px solid var(--ash-mid); border-radius: 2px; }
  .empty-icon {
    width: 42px; height: 42px; margin: 0 auto 18px; border: 1.5px solid var(--ash-dark);
    border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--ash-dark);
  }
  .empty-title { font-family: var(--font-display); font-size: 1.3rem; color: var(--navy); margin-bottom: 8px; }
  .empty-sub { font-size: 0.85rem; color: var(--text-light); font-weight: 300; }
  .loading-row, .error-row { text-align: center; padding: 50px 20px; color: var(--text-light); font-size: 0.86rem; font-weight: 300; }
  .error-row { color: var(--danger); }
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--navy-deep); color: var(--white); font-size: 0.82rem; font-weight: 400;
    padding: 14px 26px; border-radius: 3px; opacity: 0; transition: opacity .3s, transform .3s;
    pointer-events: none; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); }
  @media (max-width: 600px) {
    .wrap { padding: 40px 6% 60px; }
    .header { align-items: flex-start; }
    .file-row { flex-wrap: wrap; }
    .file-actions { width: 100%; justify-content: flex-start; margin-top: 4px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div>
      <span class="brand-label">Bean Sprout Realty Inc.</span>
      <h1 class="brand-title">Client Files</h1>
    </div>
    <span class="pill">Admin</span>
  </div>

  <div class="meta-bar">
    <span class="meta-text">Manage documents visible to the client.</span>
  </div>

  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="drop-title">Upload files for the client</div>
    <div class="drop-sub">Click to browse, or drag files here · max 5MB each</div>
  </div>

  <div id="file-list-wrap">
    <div class="loading-row">Loading files…</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" multiple style="display:none;">

<script>
  const LIST_URL = '/.netlify/functions/files-list';
  const UPLOAD_URL = '/.netlify/functions/files-upload';
  const DELETE_URL = '/.netlify/functions/files-delete';
  const DOWNLOAD_URL = '/.netlify/functions/files-download';

  let files = [];

  const fileListWrap = document.getElementById('file-list-wrap');
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { t.className = 'toast'; }, 2600);
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function extTag(name) {
    const ext = name.split('.').pop().toUpperCase().slice(0, 4);
    return ext || 'FILE';
  }

  async function loadFiles() {
    try {
      const res = await fetch(LIST_URL);
      if (!res.ok) throw new Error('Request failed');
      files = await res.json();
      render();
    } catch (e) {
      fileListWrap.innerHTML = `<div class="error-row">Couldn't load files. Check that the Netlify Functions are deployed.</div>`;
    }
  }

  function render() {
    if (!files || files.length === 0) {
      fileListWrap.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="empty-title">No files yet</div>
          <div class="empty-sub">Upload a document above to share it with the client.</div>
        </div>`;
      return;
    }

    const rows = files.map(f => `
      <div class="file-row">
        <div class="file-icon">${extTag(f.name)}</div>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-sub">${formatBytes(f.size)} · Added ${formatDate(f.date)}</div>
        </div>
        <div class="file-actions">
          <a class="btn-icon" href="${DOWNLOAD_URL}?id=${f.id}" download="${f.name}">Download</a>
          <button class="btn-icon danger" data-id="${f.id}">Remove</button>
        </div>
      </div>
    `).join('');

    fileListWrap.innerHTML = `<div class="file-list">${rows}</div>`;

    fileListWrap.querySelectorAll('.btn-icon.danger').forEach(btn => {
      btn.addEventListener('click', () => removeFile(btn.dataset.id, btn));
    });
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handleFiles(fileObjs) {
    const MAX = 5 * 1024 * 1024;
    for (const file of Array.from(fileObjs)) {
      if (file.size > MAX) {
        showToast(`"${file.name}" exceeds the 5MB limit`, true);
        continue;
      }
      try {
        const dataBase64 = await fileToBase64(file);
        const res = await fetch(UPLOAD_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: file.name, size: file.size, type: file.type, dataBase64 })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Upload failed');
        }
        showToast(`"${file.name}" uploaded`);
        await loadFiles();
      } catch (e) {
        showToast(`Couldn't upload "${file.name}" — ${e.message}`, true);
      }
    }
  }

  async function removeFile(id, btn) {
    const f = files.find(x => x.id === id);
    btn.disabled = true;
    try {
      const res = await fetch(DELETE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      if (!res.ok) throw new Error('Delete failed');
      showToast(f ? `"${f.name}" removed` : 'File removed');
      await loadFiles();
    } catch (e) {
      showToast('Could not remove file', true);
      btn.disabled = false;
    }
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => {
    handleFiles(e.target.files);
    fileInput.value = '';
  });

  loadFiles();
</script>
</body>
</html>
